name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Comprobar errores en el código
        run: uv run python3 -m ruff check . --fix

      - name: Formatear el código
        run: uv run python3 -m ruff format . --check

      - name: Ejecutar tests unitarios
        run: uv run python3 -m pytest ./core/tests/unit

      - name: Ejecutar tests de integración
        run: uv run python3 -m pytest ./core/tests/integration

      - name: Ejecutar tests de BDD
        run: uv run python3 -m pytest ./core/tests/behaviour